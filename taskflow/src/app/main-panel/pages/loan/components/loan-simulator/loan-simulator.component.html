@if (loadingEmpr()) {
  <div class="d-flex justify-content-center align-items-center">
    <mat-spinner></mat-spinner>
  </div>
} @else {
  <form [formGroup]="formCred" (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-group">
      <label for="date-field">Valor Desejado:</label>
      <input
        type="number"
        class="form-control"
        id="amount-field"
        formControlName="amount"
        placeholder="Valor do crédito"
      />
    </div>
    <div class="form-group">
      <label for="description-field">Parcelas:</label>
      <input
        type="select"
        class="form-control"
        id="parcelas-field"
        placeholder="Nº de parcelas"
        formControlName="parcelas"
      />
    </div>

    <div class="simulation-card mt-4">
      <div class="simulation-item">
        <span>Valor da Parcela </span>
        <strong>{{
          formCred.get("valorParcela")?.value | currency: "BRL"
        }}</strong>
      </div>

      <div class="simulation-item">
        <span>Total a Pagar </span>
        <strong>{{
          formCred.get("valorTotal")?.value | currency: "BRL"
        }}</strong>
      </div>
    </div>
    <div class="mt-3">
      <button type="submit" class="btn btn-primary me-2">Contratar</button>
    </div>
  </form>
}
