<div class="p-3">
  <mat-card class="text-nf-primary" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Transferência</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="formTransfer" (ngSubmit)="onSubmit()">

        <mat-card-content>
          <div class="form-group">
            <label for="text">Conta Destino</label>
            <input
              type="text"
              placeholder="Digita a conta que deverá receber o valor"
              class="form-control"
              id="destAccount-field"
              formControlName="destAccount"
            />
          </div>
          <div class="form-group">
            <label for="description-field">Descrição</label>
            <input
              type="text"
              class="form-control"
              id="description-field"
              placeholder="Digite uma descrição"
              formControlName="description"
            />
          </div>
          <div class="form-group">
            <label for="amount-field">Valor</label>
            <input
              type="number"
              placeholder="0,00"
              class="form-control"
              step="0.01"
              id="amount-field"
              formControlName="amount"
            />
          </div>

          <div class="mt-3">
            <button
              type="submit"
              class="btn btn-primary me-2"
              [disabled]="formTransfer.invalid || isTransfering()"
            >
              {{ isTransfering() ? "Transferindo..." : "Transferir" }}
            </button>
          </div>
        </mat-card-content>
      </form>
    </mat-card-content>
  </mat-card>
</div>
