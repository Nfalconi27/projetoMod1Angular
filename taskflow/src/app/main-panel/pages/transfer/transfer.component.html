<div class="p-3">
  <mat-card class="text-nf-primary" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Tranferência</mat-card-title>
      @if (account$(); as account) {
        <mat-card-subtitle class="text-nf-primary">
          <p>
            Saldo Atual:
            <strong> {{ account.balance | currency: "BRL" }}</strong>
          </p>
        </mat-card-subtitle>
      }
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="formTransfer" (ngSubmit)="onSubmit()">
        <!-- os atributos for e id no label e no input se relacionam entre si, permitindo que, ao clicar no label, o respectivo campo receba o foco.-->
        <!-- o atributo formControlName do input é quem faz o realcionamento entre o campo e o formControl no arquivo .ts -->

        <mat-card-content>
          <div class="form-group">
            <label for="date-field">Conta Destino</label>
            <input
              type="text"
              class="form-control"
              id="destAccount-field"
              formControlName="destAccount"
            />
          </div>
          <div class="form-group">
            <label for="description-field">Descrição</label>
            <input
              type="text"
              class="form-control"
              id="description-field"
              placeholder="Digite uma descrição"
              formControlName="description"
            />
          </div>
          <div class="form-group">
            <label for="amount-field">Valor</label>
            <input
              type="number"
              class="form-control"
              id="amount-field"
              formControlName="amount"
            />
          </div>

          <div class="mt-3">
            <button
              type="submit"
              class="btn btn-primary me-2"
              [disabled]="formTransfer.invalid || isTransfering()"
            >
              {{ isTransfering() ? "Transferindo..." : "Transferir" }}
            </button>
          </div>
        </mat-card-content>
      </form>
    </mat-card-content>
  </mat-card>
</div>
