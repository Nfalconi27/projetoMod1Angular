<header class="header">
  <div><img src="assets/images/logo.png" alt="Logo NF" width="130" height="90"></div>

  <div class="d-flex align-items-center text-nf-primary">
    @if(authService.isAuthenticated()){
      <span class="me-3">Bem-vinda, {{accountData()?.name}}!</span>
      <button mat-icon-button (click)="logout()" aria-label="Sair do sistema">
        <mat-icon
          aria-hidden="false"
          aria-label="Ícone do botão de sair"
          fontIcon="logout"
        ></mat-icon>
      </button>
    }
  </div>
</header>
